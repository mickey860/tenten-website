<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="8" y1="8" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f4dc72"/>
      <stop offset="100%" stop-color="#b3861f"/>
    </linearGradient>
  </defs>

  <!-- 完整金圆环 -->
  <circle cx="60" cy="60" r="54" stroke="url(#gold)" stroke-width="1.4" fill="none"/>

  <!-- 内黑底圆 -->
  <circle cx="60" cy="60" r="46" fill="#0f0e0c"/>

  <!-- 左 T — 金色 -->
  <rect x="27"   y="32" width="20"  height="3.5" rx="1.75" fill="url(#gold)"/>
  <rect x="34.8" y="32" width="4.5" height="33"  rx="2"    fill="url(#gold)"/>

  <!-- 右 T — 白色 -->
  <rect x="73"   y="32" width="20"  height="3.5" rx="1.75" fill="#ede9e0"/>
  <rect x="80.8" y="32" width="4.5" height="33"  rx="2"    fill="#ede9e0"/>

  <!-- 中心金点 · 乘号 -->
  <circle cx="60" cy="50" r="2.8" fill="url(#gold)"/>
</svg>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; }
      body { font-family: 'Noto Sans SC', sans-serif; background-color: #f5f5f5; }

      nav {
        background-color: #333;
        padding: 16px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo { color: white; font-size: 20px; font-weight: bold; }
      .nav-links a { color: white; text-decoration: none; margin-left: 24px; }

      .content {
        max-width: 600px;
        margin: 80px auto;
        padding: 0 40px;
      }
      .content h1 { font-size: 40px; color: #333; margin-bottom: 40px; }

      .form-group {
        margin-bottom: 24px;
      }
      .form-group label {
        display: block;
        color: #333;
        margin-bottom: 8px;
        font-size: 14px;
      }
      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-family: 'Noto Sans SC', sans-serif;
        font-size: 15px;
        box-sizing: border-box;
      }
      .form-group textarea { height: 140px; resize: vertical; }

      .btn {
        background-color: #e94560;
        color: white;
        padding: 14px 32px;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .btn:hover { background-color: #c73652; }

      footer {
        background-color: #333;
        color: #aaa;
        text-align: center;
        padding: 40px;
        margin-top: 80px;
      }
      /* 手机端适配 */
        @media (max-width: 768px) {

      /* 导航栏变成上下排列 */
        nav {
        flex-direction: column;
        gap: 16px;
        padding: 20px;
        text-align: center;
        }

      /* Hero标题缩小 */
        .hero h1 {
        font-size: 32px;
        padding: 0 20px;
        }
        .hero p {
        font-size: 16px;
        padding: 0 20px;
        }

      /* 卡片变成竖排 */
        .cards {
        flex-direction: column;
        align-items: center;
        }
        .card {
        width: 80%;
        }

    }
    </style>
  </head>
  <body>

    <nav>
      <div class="logo">我的公司</div>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="about.html">关于我们</a>
        <a href="contact.html">联系我们</a>
      </div>
    </nav>

    <div class="content">
      <h1>联系我们</h1>
    <form action="https://formspree.io/f/xaqperpq" method="post">
      <div class="form-group">
        <label>你的名字</label>
        <input type="text" name="name" placeholder="请输入名字">
      </div>
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" name="email" placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label>留言内容</label>
        <textarea name="message" placeholder="请输入你想说的话"></textarea>
      </div>
      <button class="btn">发送留言</button>
    </form>
    </div>

    <footer>
      <p>© 2026 我的公司 · 保留所有权利</p>
    </footer>

  </body>
</html>
